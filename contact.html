<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.6.1/font/bootstrap-icons.css">
    <link rel="stylesheet"  href="styles.css">
    <link rel="shortcut icon" type="image/png" href="images/Logo.png">
    <title>Circle Fitment Center - Contact</title>
</head>
<body>

    <header class="header">
        <a href="index.html"><img src="images/logo.png" alt="Circle Fitment Center"></a>
        <input class="menu-btn" type="checkbox" id="menu-btn">
        <label class="menu-icon" for="menu-btn"><span class="nav-icon"></span></label>
        <ul class="menu">
            <li><a href="index.html">HOME</a></li>
            <li><a href="services.html">SERVICES</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </header>

    <main>
        <section class="contact-section active" id="contact">
            <form class="contact-form" id="contactForm">
                <h1 class="header">CONTACT ME</h1>
                <input type="text" name="name" id="name" autocomplete="off" placeholder="name">
                <input type="email" name="email" id="email" autocomplete="off" placeholder="email">
                <textarea name="msg" id="msg" autocomplete="off" placeholder="message"></textarea>
                <button type="submit" class="form-submit-btn">contact</button>
            </form>

            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3565.614413518767!2d28.58981971469904!3d-26.660825439166224!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e94ca3cd73f15b7%3A0xa4ef633c56203aba!2sR51%20%26%20Dyer%20Street%2C%20Balfour%2C%202410!5e0!3m2!1sen!2sza!4v1642523835853!5m2!1sen!2sza" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div class="wrapper">
            <a href="mailto:John@circlefitmentcenter.co.za"><i class="bi bi-envelope-fill"></i></a>
            <h5>copyright &copy; 2021 by Circle Fitment Centre. Proudly created by moshelly.co.za</h5>
        </div>
    </footer>

    <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const msg = document.getElementById('msg').value.trim();
        if(!name || !email || !msg){
            alert('Please fill all fields.');
            return;
        }
        alert('Thanks, ' + name + '! Your message has been received.');
        this.reset();
    });
    </script>

</body>
</html>
